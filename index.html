async function login(){
  const msg=document.getElementById('authMsg');

  if(!sb){
    msg.innerText='Supabase n’est pas encore configuré dans le fichier HTML.';
    return;
  }

  const email=document.getElementById('authEmail').value.trim();

  if(!email){
    msg.innerText='Entre ton email.';
    return;
  }

  const redirectUrl=window.location.origin+window.location.pathname;

  const {error}=await sb.auth.signInWithOtp({
    email,
    options:{
      shouldCreateUser:false,
      emailRedirectTo:redirectUrl
    }
  });

  msg.innerText=error?error.message:'Email envoyé ✅ Vérifie ta boîte mail.';
}

async function logout(){
  if(!sb)return;
  await sb.auth.signOut();
  location.reload();
}

function listenAuth(){
  if(!sb)return;

  sb.auth.onAuthStateChange(async (event, session)=>{
    if(event==='SIGNED_IN'&&session){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appUI').style.display='grid';
      await fetchRemote();
      renderColumnFilterOptions();
      render();
      setSync('ok','Supabase actif','Collaboration live activée.');
    }

    if(event==='SIGNED_OUT')location.reload();
  });
}
